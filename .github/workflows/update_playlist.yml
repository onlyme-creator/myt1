# .github/workflows/update_playlist.yml
#
# Runs update_playlist.py every 12 hours (and on every push to main),
# then commits the freshly-compiled playlist.m3u back to the repository.
#
# Your permanent Raw URL will be:
#   https://raw.githubusercontent.com/<YOUR_USERNAME>/<YOUR_REPO>/main/playlist.m3u
#
# ──────────────────────────────────────────────────────────────────────────
# SETUP CHECKLIST (one-time, before first run)
# ──────────────────────────────────────────────────────────────────────────
#  1. Replace <YOUR_USERNAME> and <YOUR_REPO> below with your GitHub details,
#     OR simply leave the default — GitHub provides GITHUB_REPOSITORY
#     automatically and the workflow reads it.
#  2. Make sure the repo's default branch is named "main" (or update
#     the `branches` and checkout ref below to match).
#  3. Ensure the repo Settings → Actions → General →
#     "Workflow permissions" is set to "Read and write permissions".
#     This allows the workflow to commit the playlist back to the repo.
# ──────────────────────────────────────────────────────────────────────────
 
name: Update IPTV Playlist
 
on:
  workflow_dispatch:
  # Run on every push to main (useful for testing)
  push:
    branches:
      - main
 
  # Run automatically every 12 hours
  # Cron syntax (UTC): minute  hour  day  month  weekday
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write
 
jobs:
  build-playlist:
    name: Compile playlist.m3u
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Check out the repository ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the commit step can push
          fetch-depth: 0
 
      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      # ── 3. Cache pip dependencies ─────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
 
      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # ── 5. Run the playlist compiler ──────────────────────────────────────
      - name: Compile playlist
        run: python update_playlist.py
 
      # ── 6. Commit playlist, EPG, and health files ────────────────────────────
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add playlist.m3u epg.xml.gz dead_channels.txt health_report.txt
 
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update playlist [${TIMESTAMP}]"
            git push
          fi
 
      # ── 7. Open or close a GitHub Issue based on dead channels ───────────────
      #
      # Requires: Settings → Actions → General → Workflow permissions →
      #           "Read and write permissions" (already needed for the push above)
      #
      - name: Manage dead-channel GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEAD_COUNT=$(grep -c "^\\[" dead_channels.txt 2>/dev/null || echo 0)
          ISSUE_TITLE="⚠️ Dead channels detected in playlist"
 
          # Check if an open issue with this title already exists
          EXISTING=$(gh issue list --state open --search "$ISSUE_TITLE" --json number --jq '.[0].number' 2>/dev/null || echo "")
 
          if [ "$DEAD_COUNT" -gt "0" ]; then
            BODY=$(printf "## Dead Channels Detected\n\nThe latest playlist run found **%s dead channel(s)**.\nThey have been automatically removed from \`playlist.m3u\` and will reappear automatically when they come back online.\n\n### Dead Channels:\n\`\`\`\n%s\`\`\`\n\n> _This issue was auto-generated by GitHub Actions. It will close automatically when all channels recover._" \
              "$DEAD_COUNT" "$(grep -A1 '^\[' dead_channels.txt 2>/dev/null || echo 'See dead_channels.txt')")
 
            if [ -n "$EXISTING" ]; then
              # Update the existing issue with fresh info
              gh issue edit "$EXISTING" --body "$BODY"
              echo "Updated existing issue #$EXISTING"
            else
              # Open a new issue
              gh issue create --title "$ISSUE_TITLE" --body "$BODY" --label "bug" 2>/dev/null || \
              gh issue create --title "$ISSUE_TITLE" --body "$BODY"
              echo "Opened new dead-channel issue"
            fi
          else
            # All channels alive — close any open issue
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --comment "✅ All channels are back online! Closing this issue automatically."
              echo "Closed issue #$EXISTING — all channels recovered"
            else
              echo "All channels alive — no issue to manage"
            fi
          fi
